<!DOCTYPE html><html><head><meta charset="utf-8"><title>FlowBoard Bridge</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:16px;background:#f8f9fa;color:#1a1a2e;min-width:280px}
h2{font-size:16px;margin-bottom:12px;color:#6c5ce7}.status-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.dot.green{background:#00b894}.dot.yellow{background:#fdcb6e}.dot.red{background:#d63031}
.metrics{margin-top:12px;padding:10px;background:white;border-radius:8px;font-size:12px}.metrics div{margin-bottom:4px}
button{margin-top:12px;padding:8px 16px;background:#6c5ce7;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;width:100%}button:hover{background:#5a4bd1}
</style></head><body>
<h2>FlowBoard Bridge</h2><div id="status"></div><div class="metrics" id="metrics"></div><button id="disconnectBtn">Disconnect</button>
<script src="sidepanel.js"></script></body></html>
